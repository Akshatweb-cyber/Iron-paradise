<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANS | IRON PARADISE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* (Same Mobile-Fix Header) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f'); background-size: cover; background-attachment: fixed; color: #fff; overflow-x: hidden; }
        header { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 3px solid #ff003c; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: 900; width: 100%; text-align: center; } .logo span { color: #ff003c; }
        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        nav a { color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; padding: 5px 10px; }
        .container { width: 95%; max-width: 1200px; margin: 40px auto; text-align: center; }
        .plan-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .plan-card { background: #111; border: 2px solid #222; padding: 30px; width: 100%; max-width: 350px; border-radius: 10px; }
        .plan-card.premium { border-color: #ff003c; }
        .price { font-size: 2rem; color: #ff003c; margin: 15px 0; font-weight: 900; }
        ul { list-style: none; color: #ccc; font-size: 0.9rem; margin-bottom: 20px; }
        .plan-btn { display: block; padding: 12px; background: #ff003c; color: #fff; text-decoration: none; font-weight: 700; }
        @media (min-width: 768px) { header { justify-content: space-between; } .logo { width: auto; } }
    </style>
</head>
<body>
    <header><div class="logo">IRON <span>PARADISE</span></div><nav><a href="index.html">Home</a><a href="services.html">Services</a><a href="plans.html">Plans</a><a href="gallery.html">Gallery</a><a href="contact.html">Contact</a></nav></header>
    <div class="container">
        <h1>Member<span>ships</span></h1>
        <div class="plan-wrapper">
            <div class="plan-card animate__animated animate__fadeInUp"><h3>Basic</h3><div class="price">₹1,499</div><ul><li>Locker Access</li><li>Full Floor Access</li></ul><a href="#" class="plan-btn">Join Now</a></div>
            <div class="plan-card premium animate__animated animate__fadeInUp"><h3>Elite</h3><div class="price">₹2,999</div><ul><li>Personal Coach</li><li>Diet Plan</li></ul><a href="#" class="plan-btn">Join Now</a></div>
        </div>
    </div>
</body>
</html>
